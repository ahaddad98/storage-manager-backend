services:
  db:
    image: postgres:16-alpine
    container_name: ma-cabinet-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ma_cabinet}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ma_cabinet}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ma-cabinet-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ma-cabinet-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8005:8005"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ma-cabinet-network

  adminer:
    image: adminer:4
    container_name: ma-cabinet-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ma-cabinet-network

networks:
  ma-cabinet-network:
    name: ma-cabinet-network
    driver: bridge

volumes:
  postgres_data:
