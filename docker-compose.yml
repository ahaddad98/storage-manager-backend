services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infood-api
    restart: always
    env_file:
      - .env
    expose:
      - "8005"
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8005}:8005"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8005/health', timeout=5)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - infood-network

  db:
    image: postgres:16-alpine
    container_name: infood-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ma_cabinet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-ma_cabinet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ma_cabinet} -d ${POSTGRES_DB:-ma_cabinet}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - infood-network

networks:
  infood-network:
    name: infood-network
    external: true

volumes:
  postgres_data:
